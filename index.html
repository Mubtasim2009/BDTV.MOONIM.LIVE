<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BDTV – Live TV, movies &amp; series." />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav hero-nav" id="topNav">
      <div class="nav-left">
        <div class="nav-profile">
          <img src="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" class="profile-icon" alt="Profile" />
          <span class="nav-dropdown-arrow">▾</span>
        </div>
      </div>
      <nav class="nav-center" id="navLinks">
        <button class="nav-search-btn" id="navSearchBtn" aria-label="Search">🔍</button>
        <a href="index.html" class="nav-link active">Home</a>
        <a href="search.html?type=tv" class="nav-link">Shows</a>
        <a href="search.html?type=movie" class="nav-link">Movies</a>
        <a href="live.html" class="nav-link">Live TV</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <!-- Mobile toggle -->
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-right">
        <span class="nav-logo-n">N</span>
      </div>
    </header>

    <main>
      <section class="hero" id="heroBanner">
        <div class="hero-info">
          <div class="hero-info-left">
            <div class="hero-type-label" id="heroTypeLabel">SERIES</div>
            <h1 class="hero-title" id="heroTitle">Loading…</h1>
            <div class="hero-meta" id="heroMeta"></div>
          </div>
          <div class="hero-coming-badge" id="heroComingBadge" style="display:none;">📅 <span id="heroComingText">Coming Soon</span></div>
        </div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Your Next Watch</h2><span id="trendingMoviesStatus" class="section-status"></span></header>
        <div id="trendingMoviesLandscape" class="landscape-row"></div>
        <div id="trendingMoviesPortrait" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Trending TV</h2><span id="trendingTvStatus" class="section-status"></span></header>
        <div id="trendingTvLandscape" class="landscape-row"></div>
        <div id="trendingTvPortrait" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Now Playing</h2><span id="nowPlayingMoviesStatus" class="section-status"></span></header>
        <div id="nowPlayingMovies" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Popular TV Shows</h2><span id="popularTvStatus" class="section-status"></span></header>
        <div id="popularTv" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Popular Movies</h2><span id="popularMoviesStatus" class="section-status"></span></header>
        <div id="popularMovies" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Top Rated Movies</h2><span id="topRatedMoviesStatus" class="section-status"></span></header>
        <div id="topRatedMovies" class="card-row"></div>
      </section>

      <section class="content-section">
        <header class="section-header"><h2>Top Rated TV Shows</h2><span id="topRatedTvStatus" class="section-status"></span></header>
        <div id="topRatedTv" class="card-row"></div>
      </section>
    </main>

    <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
