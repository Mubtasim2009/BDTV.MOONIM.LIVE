<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BDTV – Live TV, movies &amp; series." />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="top-brand">
      <img src="https://raw.githubusercontent.com/Mubtasim2009/BDTV.MOONIM.LIVE/refs/heads/main/assets/brand/LOGO.webp" alt="BDTV logo" />
    </a>
    <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>
    <div class="top-right">
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link active">Home</a>
        <a href="search.html" class="nav-link">Search</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <a href="live.html" class="live-btn-nav">&#x25CF; Live TV</a>
    </div>
  </header>

  <main>
    <!-- Hero Carousel -->
    <section class="hero-carousel" id="heroCarousel" aria-label="Featured movies and series">
      <div class="hero-carousel-track" id="heroCarouselTrack"></div>
      <div class="hero-carousel-overlay"></div>
      <div class="hero-carousel-content" id="heroCarouselContent">
        <div class="hero-carousel-info" id="heroCarouselInfo">
          <div class="hero-carousel-logo-wrap" id="heroCarouselLogoWrap"></div>
          <p class="hero-carousel-plot" id="heroCarouselPlot"></p>
          <div class="hero-carousel-actions">
            <a class="hero-watch-btn" id="heroWatchBtn" href="#">&#9654; Watch Now</a>
          </div>
        </div>
      </div>
      <button class="hero-carousel-arrow hero-carousel-arrow--prev" id="heroCarouselPrev" aria-label="Previous">&#8249;</button>
      <button class="hero-carousel-arrow hero-carousel-arrow--next" id="heroCarouselNext" aria-label="Next">&#8250;</button>
      <div class="hero-carousel-dots" id="heroCarouselDots"></div>
      <div class="hero-search-wrap">
        <form id="heroSearchForm" class="hero-search" action="search.html" method="get">
          <input id="heroSearchInput" type="search" name="q" placeholder="Search movies or TV shows…" aria-label="Search" autocomplete="off" />
          <button type="submit">Search</button>
        </form>
      </div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Trending Movies</h2><span id="trendingMoviesStatus" class="section-status"></span></header>
      <div id="trendingMoviesLandscape" class="landscape-row"></div>
      <div id="trendingMoviesPortrait" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Trending TV</h2><span id="trendingTvStatus" class="section-status"></span></header>
      <div id="trendingTvLandscape" class="landscape-row"></div>
      <div id="trendingTvPortrait" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Now Playing</h2><span id="nowPlayingMoviesStatus" class="section-status"></span></header>
      <div id="nowPlayingMovies" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Popular TV Shows</h2><span id="popularTvStatus" class="section-status"></span></header>
      <div id="popularTv" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Popular Movies</h2><span id="popularMoviesStatus" class="section-status"></span></header>
      <div id="popularMovies" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Top Rated Movies</h2><span id="topRatedMoviesStatus" class="section-status"></span></header>
      <div id="topRatedMovies" class="card-row"></div>
    </section>

    <section class="content-section">
      <header class="section-header"><h2>Top Rated TV Shows</h2><span id="topRatedTvStatus" class="section-status"></span></header>
      <div id="topRatedTv" class="card-row"></div>
    </section>
  </main>

  <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>
  <script src="assets/js/home.js"></script>
</body>
</html>
