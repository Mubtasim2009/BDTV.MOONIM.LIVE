<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MoonStream – Browse by Genre</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Browse movies and TV shows by genre on MoonStream." />
  <link rel="icon" type="image/webp" href="assets/brand/MOONSTREAMICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="top-brand">
      <img src="assets/brand/MOONSTREAMLOGO.webp" alt="MoonStream logo" />
    </a>
    <div class="top-right">
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a href="genre.html" class="nav-link active"><i class="fa-solid fa-film"></i> Genres</a>
        <a href="watchlist.html" class="nav-link"><i class="fa-solid fa-bookmark"></i> My List</a>
        <a href="about.html" class="nav-link"><i class="fa-solid fa-circle-info"></i> About</a>
      </nav>
      <a href="live.html" class="live-btn-nav" aria-label="Live TV"><i class="fa-solid fa-tower-broadcast"></i><span class="live-btn-text"> Live TV</span></a>
      <a href="search.html" class="nav-search-mobile" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="genre-page">
    <h1><i class="fa-solid fa-film"></i> Browse by Genre</h1>
    <p class="genre-subtitle">Pick a genre to discover movies and TV shows.</p>

    <div class="genre-type-tabs" id="genreTypeTabs">
      <button class="genre-type-btn genre-type-btn--active" data-type="movie"><i class="fa-solid fa-film"></i> Movies</button>
      <button class="genre-type-btn" data-type="tv"><i class="fa-solid fa-tv"></i> TV Shows</button>
    </div>

    <!-- Genre tiles -->
    <div id="genreTilesSection">
      <div id="genreTiles" class="genre-tiles"></div>
    </div>

    <!-- Results for a selected genre -->
    <div id="genreResultsSection" style="display:none;">
      <div class="genre-results-header">
        <button class="genre-back-btn" id="genreBackBtn"><i class="fa-solid fa-arrow-left"></i> All Genres</button>
        <h2 id="genreResultsTitle"></h2>
      </div>
      <div id="genreResultsGrid" class="search-grid"></div>
      <div id="genreLoadMoreWrap" style="text-align:center;margin-top:1.5rem;display:none;">
        <button id="genreLoadMore" class="hero-watch-btn" style="font-size:0.875rem;padding:0.55rem 1.5rem;"><i class="fa-solid fa-circle-plus"></i> Load More</button>
      </div>
    </div>
  </main>

  <footer class="site-footer"><img src="/assets/brand/moonstream.gif" alt="MoonStream" style="height:32px;vertical-align:middle;margin-right:8px;">MoonStream &#xB7; Powered by TMDB</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/genre.js"></script>
</body>
</html>
