<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Search BDTV for movies and TV shows." />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>try{var t=localStorage.getItem("bdtv_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="top-brand">
      <img src="https://raw.githubusercontent.com/Mubtasim2009/BDTV.MOONIM.LIVE/refs/heads/main/assets/brand/LOGO.webp" alt="BDTV logo" />
    </a>
    <div class="top-right">
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="search.html" class="nav-link active"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a href="genre.html" class="nav-link"><i class="fa-solid fa-film"></i> Genres</a>
        <a href="watchlist.html" class="nav-link"><i class="fa-solid fa-bookmark"></i> My List</a>
        <a href="about.html" class="nav-link"><i class="fa-solid fa-circle-info"></i> About</a>
      </nav>
      <a href="live.html" class="live-btn-nav" aria-label="Live TV"><i class="fa-solid fa-tower-broadcast"></i><span class="live-btn-text"> Live TV</span></a>
      <button class="theme-toggle" aria-label="Toggle dark/light mode">
        <i class="fa-solid fa-moon icon-moon"></i>
        <i class="fa-solid fa-sun icon-sun"></i>
      </button>
      <a href="#searchInput" class="nav-search-mobile" aria-label="Search" aria-current="page"><i class="fa-solid fa-magnifying-glass"></i></a>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <main class="search-page">
    <form id="searchForm" class="search-bar-wrap">
      <input id="searchInput" type="text" placeholder="Search movies or TV shows&#x2026;" aria-label="Search" />
      <select id="searchType">
        <option value="multi">All</option>
        <option value="movie">Movies</option>
        <option value="tv">TV</option>
      </select>
      <button type="submit"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
    </form>

    <div class="results-info" id="resultsInfo">Enter a query to begin.</div>
    <div id="resultsGrid" class="search-grid"></div>
    <div class="empty-state" id="emptyState" style="display:none;">No match found.</div>
    <div class="error-state" id="errorState" style="display:none;">Error loading results. Check console.</div>
  </main>

  <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>
