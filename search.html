<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – Search</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Search BDTV for movies and TV shows." />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav">
      <div class="nav-left">
        <div class="nav-profile">
          <img src="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" class="profile-icon" alt="Profile" />
          <span class="nav-dropdown-arrow">▾</span>
        </div>
      </div>
      <nav class="nav-center" id="navLinks">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html?type=tv" class="nav-link">Shows</a>
        <a href="search.html?type=movie" class="nav-link">Movies</a>
        <a href="live.html" class="nav-link">Live TV</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-right">
        <span class="nav-logo-n">N</span>
      </div>
    </header>

    <main class="search-page">
      <form id="searchForm" class="search-bar-wrap">
        <input id="searchInput" type="text" placeholder="Search movies or TV shows&#x2026;" aria-label="Search" />
        <select id="searchType">
          <option value="multi">All</option>
          <option value="movie">Movies</option>
          <option value="tv">TV</option>
        </select>
        <button type="submit">Search</button>
      </form>

      <div class="results-info" id="resultsInfo">Enter a query to begin.</div>
      <div id="resultsGrid" class="search-grid"></div>
      <div class="empty-state" id="emptyState" style="display:none;">No match found.</div>
      <div class="error-state" id="errorState" style="display:none;">Error loading results. Check console.</div>
    </main>

    <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/search.js"></script>
</body>
</html>
