<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – Live TV</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="BDTV Live TV – BDIX IPTV player." />
  <link rel="icon" type="image/webp" href="https://github.com/user-attachments/assets/c8f6a2fa-99e8-49a1-a774-cf6d021082b6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
</head>
<body>
  <header class="top-nav">
    <a href="index.html" class="top-brand">
      <img src="https://github.com/user-attachments/assets/1e31c88e-3d02-4578-a59e-a292c340ecb0" alt="BDTV logo" />
    </a>
    <div class="top-right">
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a href="genre.html" class="nav-link"><i class="fa-solid fa-film"></i> Genres</a>
        <a href="watchlist.html" class="nav-link"><i class="fa-solid fa-bookmark"></i> My List</a>
        <a href="about.html" class="nav-link"><i class="fa-solid fa-circle-info"></i> About</a>
      </nav>
      <a href="live.html" class="live-btn-nav" aria-label="Live TV"><i class="fa-solid fa-tower-broadcast"></i><span class="live-btn-text"> Live TV</span></a>
      <a href="search.html" class="nav-search-mobile" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div class="live-shell">
    <header class="live-header">
      <div class="live-title"><i class="fa-solid fa-tower-broadcast"></i> Live TV</div>
      <div class="live-sub">Browse BDIX playlists and watch live channels instantly.</div>
    </header>

    <section class="live-layout">
      <div class="live-player-card">
        <video id="liveVideo" controls playsinline></video>
      </div>

      <div class="live-bottom">
        <div class="playlist-header">
          <div>
            <div class="playlist-title">Channel List</div>
            <div id="liveStatus" class="live-status">Loading…</div>
          </div>
          <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">
            <select id="playlistSelect" class="playlist-select">
              <option value="falcon">Falcon Cast</option>
            </select>
            <button id="refreshPlaylistBtn" class="refresh-btn" type="button"><i class="fa-solid fa-rotate"></i> Refresh</button>
          </div>
        </div>

        <div class="channel-search-row">
          <input id="channelSearchInput" class="channel-search-input" type="text" placeholder="Search channels…" />
        </div>

        <div id="channelList" class="channel-panel"></div>
      </div>
    </section>
  </div>

  <footer class="site-footer">BDTV VOD · Powered by TMDB</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/live.js"></script>
</body>
</html>
