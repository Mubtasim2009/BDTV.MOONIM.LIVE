<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – TV Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <script>try{var t=localStorage.getItem("bdtv_theme");if(t==="light")document.documentElement.setAttribute("data-theme","light");}catch(e){}</script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
  <header class="top-nav">
    <a class="top-brand" href="index.html">
      <img src="https://raw.githubusercontent.com/Mubtasim2009/BDTV.MOONIM.LIVE/refs/heads/main/assets/brand/LOGO.webp" alt="BDTV logo" />
    </a>
    <div class="top-right">
      <nav class="nav-links" id="navLinks">
        <a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a>
        <a href="search.html" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Search</a>
        <a href="genre.html" class="nav-link"><i class="fa-solid fa-film"></i> Genres</a>
        <a href="watchlist.html" class="nav-link"><i class="fa-solid fa-bookmark"></i> My List</a>
        <a href="about.html" class="nav-link"><i class="fa-solid fa-circle-info"></i> About</a>
      </nav>
      <a href="live.html" class="live-btn-nav" aria-label="Live TV"><i class="fa-solid fa-tower-broadcast"></i><span class="live-btn-text"> Live TV</span></a>
      <button class="theme-toggle" aria-label="Toggle dark/light mode">
        <i class="fa-solid fa-moon icon-moon"></i>
        <i class="fa-solid fa-sun icon-sun"></i>
      </button>
      <a href="search.html" class="nav-search-mobile" aria-label="Search"><i class="fa-solid fa-magnifying-glass"></i></a>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <div id="playerBackdrop" class="player-backdrop">
    <div class="player-backdrop-inner">
      <img id="playerLogo" class="player-logo" src="" alt="" style="display:none;" />
    </div>
  </div>

  <main class="player-layout">
    <section class="player-card">
      <div class="player-title" id="tvTitle">Loading&#x2026;</div>
      <div class="player-tagline" id="tvTagline"></div>
      <div class="player-meta-row">
        <div class="player-meta" id="tvMeta"></div>
        <span id="tvRating" class="rating-badge" style="display:none;"></span>
      </div>
      <div id="tvWatchlistBtnContainer" style="margin-bottom:0.75rem;"></div>

      <div class="vidking-wrapper">
        <iframe id="tvFrame" allowfullscreen referrerpolicy="no-referrer" sandbox="allow-scripts allow-same-origin allow-forms allow-presentation allow-fullscreen"></iframe>
      </div>

      <p class="disclaimer">
        Streams are provided by a third-party host and may contain their own ads or external links.
      </p>

      <div id="crewRow" class="crew-row" style="display:none;"></div>

      <div id="castSection" class="cast-section" style="display:none;">
        <div class="cast-title">Top Cast</div>
        <div id="castList" class="cast-list"></div>
      </div>
    </section>

    <aside class="info-card">
      <div class="poster-wrapper">
        <img id="posterImg" src="" alt="Poster" />
        <div style="flex:1">
          <div class="tags" id="tvTags"></div>
          <div class="overview" id="tvOverview"></div>
        </div>
      </div>
      <div id="tvStatsGrid" class="stats-grid"></div>
      <div class="ad-section">
        <script async data-cfasync="false" src="https://pl28353113.effectivegatecpm.com/92d4392296fa5e19466bef5378e5a980/invoke.js"></script>
        <div id="container-92d4392296fa5e19466bef5378e5a980"></div>
      </div>
    </aside>
  </main>

  <section class="content-section" id="tvRecommendationsSection" style="display:none;">
    <header class="section-header">
      <h2><i class="fa-solid fa-layer-group"></i> More Like This</h2>
      <span id="tvRecommendationsStatus" class="section-status"></span>
    </header>
    <div id="tvRecommendations" class="card-row"></div>
  </section>

  <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/player-tv.js"></script>
</body>
</html>
