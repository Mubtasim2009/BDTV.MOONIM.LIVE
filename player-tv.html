<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BDTV – TV Player</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/webp" href="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-nav">
      <div class="nav-left">
        <div class="nav-profile">
          <img src="https://raw.githubusercontent.com/Mubtasim2009/Aboutme/232a54166d3b45fb72b6b14f2675fc830088693f/assets/brand/ICON.webp" class="profile-icon" alt="Profile" />
          <span class="nav-dropdown-arrow">▾</span>
        </div>
      </div>
      <nav class="nav-center" id="navLinks">
        <a href="index.html" class="nav-link">Home</a>
        <a href="search.html?type=tv" class="nav-link active">Shows</a>
        <a href="search.html?type=movie" class="nav-link">Movies</a>
        <a href="live.html" class="nav-link">Live TV</a>
        <a href="about.html" class="nav-link">About</a>
      </nav>
      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
      <div class="nav-right">
        <span class="nav-logo-n">N</span>
      </div>
    </header>

    <div id="playerBackdrop" class="player-backdrop">
      <div class="player-backdrop-inner">
        <img id="playerLogo" class="player-logo" src="" alt="" style="display:none;" />
      </div>
    </div>

    <main class="player-layout">
      <section class="player-card">
        <div class="player-title" id="tvTitle">Loading&#x2026;</div>
        <div class="player-tagline" id="tvTagline"></div>
        <div class="player-meta-row">
          <div class="player-meta" id="tvMeta"></div>
          <span id="tvRating" class="rating-badge" style="display:none;"></span>
        </div>

        <div class="vidking-wrapper">
          <iframe id="tvFrame" allowfullscreen referrerpolicy="no-referrer"></iframe>
        </div>

        <p class="disclaimer">
          Streams are provided by a third-party host and may contain their own ads or external links.
        </p>

        <div id="crewRow" class="crew-row" style="display:none;"></div>

        <div id="castSection" class="cast-section" style="display:none;">
          <div class="cast-title">Top Cast</div>
          <div id="castList" class="cast-list"></div>
        </div>
      </section>

      <aside class="info-card">
        <div class="poster-wrapper">
          <img id="posterImg" src="" alt="Poster" />
          <div style="flex:1">
            <div class="tags" id="tvTags"></div>
            <div class="overview" id="tvOverview"></div>
          </div>
        </div>
        <div id="tvStatsGrid" class="stats-grid"></div>
        <div class="ad-section">
          <script async data-cfasync="false" src="https://pl28353113.effectivegatecpm.com/92d4392296fa5e19466bef5378e5a980/invoke.js"></script>
          <div id="container-92d4392296fa5e19466bef5378e5a980"></div>
        </div>
      </aside>
    </main>

    <section class="content-section" id="tvRecommendationsSection" style="display:none;">
      <header class="section-header">
        <h2>More Like This</h2>
        <span id="tvRecommendationsStatus" class="section-status"></span>
      </header>
      <div id="tvRecommendations" class="card-row"></div>
    </section>

    <footer class="site-footer">BDTV VOD &#xB7; Powered by TMDB</footer>
  </div>

  <script src="assets/js/main.js"></script>
  <script src="assets/js/player-tv.js"></script>
</body>
</html>
